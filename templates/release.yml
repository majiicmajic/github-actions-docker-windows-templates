# templates/release.yml
# Automated GitHub Release creation

name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version
        id: get_version
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "version=$version" >> $env:GITHUB_OUTPUT
      
      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker image
        shell: cmd
        run: |
          docker build -t ${{ github.event.repository.name }}:${{ env.VERSION }} .
      
      - name: Export Docker image
        shell: cmd
        run: |
          mkdir exports
          docker save ${{ github.event.repository.name }}:${{ env.VERSION }} | gzip > exports/${{ github.event.repository.name }}-${{ env.VERSION }}.tar.gz
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ env.VERSION }}
          body: |
            ## 🚀 What's Changed
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## 📦 Installation
            
            ### Using Docker
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ env.VERSION }}